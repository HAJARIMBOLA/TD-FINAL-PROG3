          type: integer
          format: int64
        collectiviteId:
          type: integer
          format: int64
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'
        montant:
          type: number
          format: double
          minimum: 0.01
        dateEncaissement:
          type: string
          format: date
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        referenceTransaction:
          type: string
        motif:
          type: string
          description: Obligatoire pour les cotisations ponctuelles
        compteId:
          type: integer
          format: int64
    CreateCompteRequest:
      type: object
      required: [typeCompte]
      properties:
        typeCompte:
          $ref: '#/components/schemas/TypeCompte'
        collectiviteId:
          type: integer
          format: int64
        appartientFederation:
          type: boolean
          default: false
        nomTitulaire:
          type: string
        banque:
          $ref: '#/components/schemas/NomBanque'
        numeroRib:
          type: string
          pattern: '^[0-9]{23}$'
          description: BBBBBGGGGGCCCCCCCCCCCCKK (23 chiffres)
        serviceMobileMoney:
          $ref: '#/components/schemas/ServiceMobileMoney'
        numeroDeTelephone:
          type: string
    CreateActiviteRequest:
      type: object
      required: [titre, typeActivite, dateDebut]
      properties:
        titre:
          type: string
        description:
          type: string
        typeActivite:
          $ref: '#/components/schemas/TypeActivite'
        dateDebut:
          type: string
          format: date-time
        dateFin:
          type: string
          format: date-time
        lieu:
          type: string
        obligatoirePourTous:
          type: boolean
          default: false
        obligatoirePourJuniors:
          type: boolean
          default: false
        collectiviteId:
          type: integer
          format: int64
        activiteFederation:
          type: boolean
          default: false
    EnregistrerPresenceRequest:
